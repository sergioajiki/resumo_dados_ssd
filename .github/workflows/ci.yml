# =============================================================================
# CI — resumo-dados-ssd
# Integração Contínua: build, testes, contract tests e cobertura de código
# SES/MS — Superintendência de Saúde Digital
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Cancela execuções anteriores do mesmo PR/branch para economizar minutos do GitHub Actions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Build e testes unitários + integração
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Restaura o cache do repositório Maven (~/.m2) entre execuções
      - name: Cache do repositório Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compilar e executar testes
        run: ./mvnw clean verify --batch-mode --no-transfer-progress
        env:
          # Testes sempre usam o perfil test (MockAdapter — sem dependência do Qlik)
          SPRING_PROFILES_ACTIVE: test

      - name: Verificar resultado do build
        if: failure()
        run: |
          echo "::error::Build falhou. Verifique os logs acima."
          echo "Dica: execute './mvnw clean verify -Dspring.profiles.active=test' localmente."

      # Upload dos relatórios Surefire (resultados de testes) como artefato
      - name: Upload dos relatórios de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Contract tests (profile específico)
  # ---------------------------------------------------------------------------
  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache do repositório Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Executar contract tests
        run: ./mvnw test -Pcontract --batch-mode --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Verificar resultado dos contract tests
        if: failure()
        run: |
          echo "::error::Contract tests falharam."
          echo "Isso significa que um adaptador não cumpre o contrato de DataSourcePort."
          echo "Verifique: DataSourcePortContractTest e suas subclasses."

      - name: Upload dos relatórios de contract tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 3: Cobertura de código com JaCoCo
  # ---------------------------------------------------------------------------
  code-coverage:
    name: Cobertura de Código (JaCoCo)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache do repositório Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Gerar relatório de cobertura JaCoCo
        run: ./mvnw clean verify jacoco:report --batch-mode --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      # Upload do relatório HTML do JaCoCo como artefato para download
      - name: Upload do relatório JaCoCo (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-${{ github.run_number }}
          path: target/site/jacoco/
          retention-days: 14

      # Upload do arquivo .exec para integração com ferramentas externas (ex.: SonarQube)
      - name: Upload do JaCoCo exec
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-exec-${{ github.run_number }}
          path: target/jacoco.exec
          retention-days: 14

      # Exibe um resumo de cobertura no log para acesso rápido
      - name: Exibir resumo de cobertura
        if: always()
        run: |
          if [ -f target/site/jacoco/index.html ]; then
            echo "Relatório JaCoCo gerado com sucesso."
            echo "Para visualizar: baixe o artefato 'jacoco-report-${{ github.run_number }}' e abra index.html"
          else
            echo "::warning::Relatório JaCoCo não foi gerado. Verifique a configuração do plugin no pom.xml."
          fi

  # ---------------------------------------------------------------------------
  # Job 4: Testes de arquitetura (ArchUnit)
  # Verifica violações SOLID e dependências proibidas entre camadas
  # ---------------------------------------------------------------------------
  architecture-tests:
    name: Testes de Arquitetura (ArchUnit)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache do repositório Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Executar testes de arquitetura
        run: >
          ./mvnw test
          -Dtest="*ArchitectureTest"
          --batch-mode --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Verificar resultado dos testes de arquitetura
        if: failure()
        run: |
          echo "::error::Testes de arquitetura falharam (ArchUnit)."
          echo "Uma violação SOLID foi introduzida:"
          echo "  - Domínio dependendo de adaptador ou framework"
          echo "  - Controller acessando repositório diretamente"
          echo "  - Adaptadores com dependências cruzadas"
          echo "Verifique a classe ArchitectureTest para ver as regras violadas."
