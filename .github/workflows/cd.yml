#   - Definir estratégia de deploy (JAR direto, Docker, systemd service)
#   - Avaliar migração de H2 para PostgreSQL em produção (pendência #5 do log-progresso.md)
#   - Definir gestão de segredos em produção (Vault, variáveis de ambiente, etc.)
# =============================================================================

name: CD

# ---------------------------------------------------------------------------
# TRIGGER (INATIVO — descomente quando a infraestrutura estiver definida)
# ---------------------------------------------------------------------------

# Deploy em HOMOLOGAÇÃO — disparado por push na branch develop
# on:
#   push:
#     branches:
#       - develop

# Deploy em PRODUÇÃO — disparado por criação de tag de release (ex.: v1.0.0)
# on:
#   push:
#     tags:
#       - 'v[0-9]+.[0-9]+.[0-9]+'

# Placeholder para manter o arquivo válido enquanto o trigger está comentado
on:
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente de deploy'
        required: true
        default: 'homologacao'
        type: choice
        options:
          - homologacao
          - producao
      confirmar:
        description: 'Digite CONFIRMAR para prosseguir com o deploy'
        required: true

jobs:

  # ---------------------------------------------------------------------------
  # Guarda-chuva de segurança para deploy manual via workflow_dispatch
  # ---------------------------------------------------------------------------
  validar-confirmacao:
    name: Validar confirmação
    runs-on: ubuntu-latest
    steps:
      - name: Verificar confirmação
        run: |
          if [ "${{ github.event.inputs.confirmar }}" != "CONFIRMAR" ]; then
            echo "::error::Deploy cancelado. Digite exatamente CONFIRMAR para prosseguir."
            exit 1
          fi
          echo "Confirmação recebida. Prosseguindo com deploy em ${{ github.event.inputs.ambiente }}."

  # ---------------------------------------------------------------------------
  # Job: Build do artefato de deploy
  # ---------------------------------------------------------------------------
  build-artefato:
    name: Build do artefato
    runs-on: ubuntu-latest
    needs: validar-confirmacao

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache do repositório Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Build do JAR executável (Spring Boot fat JAR)
      # Pula os testes aqui — o CI já os executou e aprovou antes do merge
      - name: Build do JAR executável
        run: >
          ./mvnw clean package
          -DskipTests
          --batch-mode --no-transfer-progress

      # Upload do JAR como artefato para uso nos jobs de deploy
      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: resumo-dados-ssd-jar
          path: target/resumo-dados-ssd-*.jar
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job: Deploy em Homologação
  # ---------------------------------------------------------------------------
  deploy-homologacao:
    name: Deploy — Homologação
    runs-on: ubuntu-latest
    needs: build-artefato
    environment:
      name: homologacao
      # url: https://homolog.saude.ms.gov.br/resumo-dados-ssd   # descomente quando disponível

    steps:
      - name: Download do artefato
        uses: actions/download-artifact@v4
        with:
          name: resumo-dados-ssd-jar
          path: ./deploy

      - name: Listar artefato baixado
        run: ls -lh ./deploy/

      # -----------------------------------------------------------------------
